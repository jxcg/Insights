name: Build

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Insights/Insights.xcodeproj \
            -scheme Insights \
            -destination 'generic/platform=iOS Simulator'

      - name: Select simulator
        id: simulator
        run: |
          UDID=$(xcodebuild -showdestinations -project Insights/Insights.xcodeproj -scheme Insights \
            | grep "platform:iOS Simulator" | grep "name:iPhone" | head -1 \
            | sed -E 's/.*id:([^,]*),.*/\1/')
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          xcodebuild test \
            -project Insights/Insights.xcodeproj \
            -scheme Insights \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}"
