name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Insights/Insights.xcodeproj \
            -scheme Insights \
            -destination 'generic/platform=iOS Simulator'

  test:
    needs: build
    runs-on: macos-latest
    strategy:
      matrix:
        device: ["iPhone 17", "iPhone Air", "iPhone 16"]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          xcodebuild test \
            -project Insights/Insights.xcodeproj \
            -scheme Insights \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}"
