name: Build

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Insights/Insights.xcodeproj \
            -scheme Insights \
            -destination 'generic/platform=iOS Simulator'

      - name: Run tests
        run: |
          xcodebuild test \
            -project Insights/Insights.xcodeproj \
            -scheme Insights \
            -destination 'platform=iOS Simulator,name=iPhone 17'
